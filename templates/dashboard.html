<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URA Dashboard - Monitorización en Tiempo Real</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            padding: 20px;
        }
        
        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #4ecca3;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .card {
            background: #16213e;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        
        .card h2 {
            color: #4ecca3;
            margin-bottom: 15px;
            font-size: 1.2em;
        }
        
        .metric {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        
        .metric-label {
            color: #aaa;
        }
        
        .metric-value {
            font-weight: bold;
        }
        
        .status-ok {
            color: #4ecca3;
        }
        
        .status-error {
            color: #e94560;
        }
        
        .status-warning {
            color: #f9a826;
        }
        
        .progress-bar {
            height: 10px;
            background: #0f3460;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 5px;
        }
        
        .progress-fill {
            height: 100%;
            background: #4ecca3;
            transition: width 0.5s ease;
        }
        
        .progress-fill.warning {
            background: #f9a826;
        }
        
        .progress-fill.error {
            background: #e94560;
        }
        
        .alertas {
            margin-top: 30px;
        }
        
        .alerta {
            background: #e94560;
            color: white;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
        }
        
        .timestamp {
            text-align: center;
            color: #666;
            margin-top: 20px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>URA Dashboard - Monitorización en Tiempo Real</h1>
        
        <div class="grid">
            <!-- CPU -->
            <div class="card">
                <h2>CPU</h2>
                <div class="metric">
                    <span class="metric-label">Uso:</span>
                    <span class="metric-value" id="cpu-percent">--%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="cpu-bar"></div>
                </div>
                <div class="metric">
                    <span class="metric-label">Núcleos:</span>
                    <span class="metric-value" id="cpu-count">--</span>
                </div>
            </div>
            
            <!-- RAM -->
            <div class="card">
                <h2>RAM</h2>
                <div class="metric">
                    <span class="metric-label">Uso:</span>
                    <span class="metric-value" id="ram-percent">--%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="ram-bar"></div>
                </div>
                <div class="metric">
                    <span class="metric-label">Disponible:</span>
                    <span class="metric-value" id="ram-available">-- GB</span>
                </div>
            </div>
            
            <!-- Disco -->
            <div class="card">
                <h2>Disco</h2>
                <div class="metric">
                    <span class="metric-label">Uso:</span>
                    <span class="metric-value" id="disk-percent">--%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="disk-bar"></div>
                </div>
                <div class="metric">
                    <span class="metric-label">Libre:</span>
                    <span class="metric-value" id="disk-free">-- GB</span>
                </div>
            </div>
            
            <!-- Ollama -->
            <div class="card">
                <h2>Ollama</h2>
                <div class="metric">
                    <span class="metric-label">Estado:</span>
                    <span class="metric-value" id="ollama-status">--</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Latencia:</span>
                    <span class="metric-value" id="ollama-latency">--</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Modelos:</span>
                    <span class="metric-value" id="ollama-models">--</span>
                </div>
            </div>
            
            <!-- Redis -->
            <div class="card">
                <h2>Redis</h2>
                <div class="metric">
                    <span class="metric-label">Estado:</span>
                    <span class="metric-value" id="redis-status">--</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Latencia:</span>
                    <span class="metric-value" id="redis-latency">--</span>
                </div>
            </div>
            
            <!-- Docker -->
            <div class="card">
                <h2>Docker</h2>
                <div class="metric">
                    <span class="metric-label">Estado:</span>
                    <span class="metric-value" id="docker-status">--</span>
                </div>
                <div class="metric">
                    <span class="metric-label">URA Sandbox:</span>
                    <span class="metric-value" id="docker-sandbox">--</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Contenedores:</span>
                    <span class="metric-value" id="docker-containers">--</span>
                </div>
            </div>
        </div>
        
        <div class="alertas" id="alertas"></div>
        
        <div class="timestamp" id="timestamp"></div>
    </div>
    
    <script>
        function actualizarEstado() {
            fetch('/api/estado')
                .then(response => response.json())
                .then(data => {
                    // CPU
                    document.getElementById('cpu-percent').textContent = data.cpu.percent + '%';
                    document.getElementById('cpu-bar').style.width = data.cpu.percent + '%';
                    document.getElementById('cpu-bar').className = 'progress-fill ' + getStatusClass(data.cpu.percent);
                    document.getElementById('cpu-count').textContent = data.cpu.count;
                    
                    // RAM
                    document.getElementById('ram-percent').textContent = data.ram.percent + '%';
                    document.getElementById('ram-bar').style.width = data.ram.percent + '%';
                    document.getElementById('ram-bar').className = 'progress-fill ' + getStatusClass(data.ram.percent);
                    document.getElementById('ram-available').textContent = data.ram.available_gb.toFixed(1) + ' GB';
                    
                    // Disco
                    document.getElementById('disk-percent').textContent = data.disk.percent + '%';
                    document.getElementById('disk-bar').style.width = data.disk.percent + '%';
                    document.getElementById('disk-bar').className = 'progress-fill ' + getStatusClass(data.disk.percent);
                    document.getElementById('disk-free').textContent = data.disk.free_gb.toFixed(1) + ' GB';
                    
                    // Ollama
                    document.getElementById('ollama-status').textContent = data.ollama.status;
                    document.getElementById('ollama-status').className = 'metric-value ' + getStatusClass(data.ollama.status === 'ok' ? 100 : 0);
                    document.getElementById('ollama-latency').textContent = data.ollama.latencia_s?.toFixed(2) + 's' || '--';
                    document.getElementById('ollama-models').textContent = data.ollama.modelos;
                    
                    // Redis
                    document.getElementById('redis-status').textContent = data.redis.status;
                    document.getElementById('redis-status').className = 'metric-value ' + getStatusClass(data.redis.status === 'ok' ? 100 : 0);
                    document.getElementById('redis-latency').textContent = data.redis.latencia_s?.toFixed(2) + 's' || '--';
                    
                    // Docker
                    document.getElementById('docker-status').textContent = data.docker.status;
                    document.getElementById('docker-status').className = 'metric-value ' + getStatusClass(data.docker.status === 'ok' ? 100 : 0);
                    document.getElementById('docker-sandbox').textContent = data.docker.ura_sandbox_activo ? 'Activo' : 'Inactivo';
                    document.getElementById('docker-sandbox').className = 'metric-value ' + (data.docker.ura_sandbox_activo ? 'status-ok' : 'status-error');
                    document.getElementById('docker-containers').textContent = data.docker.contenedores.length;
                    
                    // Timestamp
                    document.getElementById('timestamp').textContent = 'Actualizado: ' + new Date(data.timestamp).toLocaleString();
                });
        }
        
        function actualizarAlertas() {
            fetch('/api/alertas')
                .then(response => response.json())
                .then(alertas => {
                    const alertasDiv = document.getElementById('alertas');
                    alertasDiv.innerHTML = '';
                    
                    if (alertas.length > 0) {
                        alertas.forEach(alerta => {
                            const alertaDiv = document.createElement('div');
                            alertaDiv.className = 'alerta';
                            alertaDiv.textContent = `${alerta.tipo.toUpperCase()}: ${alerta.mensaje}`;
                            alertasDiv.appendChild(alertaDiv);
                        });
                    }
                });
        }
        
        function getStatusClass(percent) {
            if (percent < 50) return '';
            if (percent < 80) return 'warning';
            return 'error';
        }
        
        // Actualizar cada 5 segundos
        actualizarEstado();
        actualizarAlertas();
        setInterval(actualizarEstado, 5000);
        setInterval(actualizarAlertas, 5000);
    </script>
</body>
</html>
