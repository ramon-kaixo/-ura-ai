<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Unificado - URA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            padding: 20px;
        }
        .dashboard { max-width: 1400px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 30px; color: #4ecca3; }
        .tabs { display: flex; margin-bottom: 20px; }
        .tab {
            padding: 15px 30px;
            background: #16213e;
            border: none;
            color: #aaa;
            cursor: pointer;
            font-size: 1em;
        }
        .tab.active { background: #4ecca3; color: #1a1a2e; font-weight: bold; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card {
            background: #16213e;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        .card h2 { color: #4ecca3; margin-bottom: 15px; font-size: 1.2em; }
        .metric { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .metric-label { color: #aaa; }
        .metric-value { font-weight: bold; }
        .status-ok { color: #4ecca3; }
        .status-error { color: #e94560; }
        .conversation {
            background: #0f3460;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 10px;
        }
        .tool {
            background: #0f3460;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>Dashboard Unificado - URA</h1>
        
        <div class="tabs">
            <button class="tab active" onclick="showTab('sistema')">Sistema</button>
            <button class="tab" onclick="showTab('conversaciones')">Conversaciones</button>
            <button class="tab" onclick="showTab('herramientas')">Herramientas</button>
            <button class="tab" onclick="showTab('alertas')">Alertas</button>
        </div>
        
        <div id="sistema" class="tab-content active">
            <div class="grid">
                <div class="card">
                    <h2>CPU</h2>
                    <div class="metric">
                        <span class="metric-label">Uso:</span>
                        <span class="metric-value" id="cpu-percent">--%</span>
                    </div>
                </div>
                <div class="card">
                    <h2>RAM</h2>
                    <div class="metric">
                        <span class="metric-label">Uso:</span>
                        <span class="metric-value" id="ram-percent">--%</span>
                    </div>
                </div>
                <div class="card">
                    <h2>Disco</h2>
                    <div class="metric">
                        <span class="metric-label">Uso:</span>
                        <span class="metric-value" id="disk-percent">--%</span>
                    </div>
                </div>
                <div class="card">
                    <h2>Ollama</h2>
                    <div class="metric">
                        <span class="metric-label">Estado:</span>
                        <span class="metric-value" id="ollama-status">--</span>
                    </div>
                </div>
                <div class="card">
                    <h2>Redis</h2>
                    <div class="metric">
                        <span class="metric-label">Estado:</span>
                        <span class="metric-value" id="redis-status">--</span>
                    </div>
                </div>
                <div class="card">
                    <h2>Docker</h2>
                    <div class="metric">
                        <span class="metric-label">Estado:</span>
                        <span class="metric-value" id="docker-status">--</span>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="conversaciones" class="tab-content">
            <div class="card">
                <h2>Conversaciones Pendientes</h2>
                <div id="conversations-list"></div>
            </div>
        </div>
        
        <div id="herramientas" class="tab-content">
            <div class="card">
                <h2>Herramientas</h2>
                <div id="tools-list"></div>
            </div>
        </div>
        
        <div id="alertas" class="tab-content">
            <div class="card">
                <h2>Alertas Activas</h2>
                <div id="alerts-list"></div>
            </div>
        </div>
    </div>
    
    <script>
        function showTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelector(`[onclick="showTab('${tabId}')"]`).classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }
        
        function actualizarEstado() {
            fetch('/api/estado')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('cpu-percent').textContent = data.cpu.percent + '%';
                    document.getElementById('ram-percent').textContent = data.ram.percent + '%';
                    document.getElementById('disk-percent').textContent = data.disco.percent + '%';
                    document.getElementById('ollama-status').textContent = data.ollama.status;
                    document.getElementById('ollama-status').className = 'metric-value ' + (data.ollama.status === 'ok' ? 'status-ok' : 'status-error');
                    document.getElementById('redis-status').textContent = data.redis.status;
                    document.getElementById('redis-status').className = 'metric-value ' + (data.redis.status === 'ok' ? 'status-ok' : 'status-error');
                    document.getElementById('docker-status').textContent = data.docker.status;
                    document.getElementById('docker-status').className = 'metric-value ' + (data.docker.status === 'ok' ? 'status-ok' : 'status-error');
                });
        }
        
        function actualizarConversaciones() {
            fetch('/api/conversaciones')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('conversations-list').innerHTML = data.pendientes.map(c => `
                        <div class="conversation">
                            <div>${c.usuario_mensaje.substring(0, 100)}...</div>
                        </div>
                    `).join('') || '<p>No hay conversaciones pendientes</p>';
                });
        }
        
        function actualizarHerramientas() {
            fetch('/api/herramientas')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('tools-list').innerHTML = data.herramientas.map(t => `
                        <div class="tool">
                            <div><strong>${t.nombre}</strong></div>
                            <div>Principal: ${t.proveedor_principal}</div>
                            <div>Alternativo: ${t.proveedor_alternativo}</div>
                        </div>
                    `).join('');
                });
        }
        
        function actualizarAlertas() {
            fetch('/api/alertas')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('alerts-list').innerHTML = data.map(a => `
                        <div class="conversation" style="background: #e94560;">
                            <div>${a.tipo.toUpperCase()}: ${a.mensaje}</div>
                        </div>
                    `).join('') || '<p>No hay alertas activas</p>';
                });
        }
        
        actualizarEstado();
        actualizarConversaciones();
        actualizarHerramientas();
        actualizarAlertas();
        
        setInterval(actualizarEstado, 5000);
        setInterval(actualizarConversaciones, 10000);
        setInterval(actualizarHerramientas, 10000);
        setInterval(actualizarAlertas, 5000);
    </script>
</body>
</html>
