<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Conversaciones Aprendidas - URA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            padding: 20px;
        }
        
        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #4ecca3;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: #16213e;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 2em;
            color: #4ecca3;
            font-weight: bold;
        }
        
        .stat-label {
            color: #aaa;
            margin-top: 10px;
        }
        
        .sections {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .section {
            background: #16213e;
            border-radius: 10px;
            padding: 20px;
        }
        
        .section h2 {
            color: #4ecca3;
            margin-bottom: 20px;
        }
        
        .conversation {
            background: #0f3460;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 10px;
        }
        
        .conversation-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        
        .conversation-time {
            color: #666;
            font-size: 0.9em;
        }
        
        .conversation-user {
            color: #4ecca3;
            font-weight: bold;
        }
        
        .conversation-cascade {
            color: #aaa;
            margin-top: 10px;
        }
        
        .btn {
            background: #4ecca3;
            color: #1a1a2e;
            border: none;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .btn:hover {
            background: #3db892;
        }
        
        .learned-badge {
            background: #4ecca3;
            color: #1a1a2e;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 0.8em;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>Panel de Conversaciones Aprendidas</h1>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="total-conversations">0</div>
                <div class="stat-label">Total Conversaciones</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="learned-conversations">0</div>
                <div class="stat-label">Conversaciones Aprendidas</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="pending-conversations">0</div>
                <div class="stat-label">Pendientes de Aprender</div>
            </div>
        </div>
        
        <div class="sections">
            <div class="section">
                <h2>Todas las Conversaciones</h2>
                <div id="all-conversations"></div>
            </div>
            
            <div class="section">
                <h2>Conversaciones Aprendidas</h2>
                <div id="learned-conversations-list"></div>
            </div>
        </div>
    </div>
    
    <script>
        function cargarConversaciones() {
            fetch('/api/conversaciones')
                .then(response => response.json())
                .then(data => {
                    // Actualizar estadísticas
                    document.getElementById('total-conversations').textContent = data.todas.length;
                    document.getElementById('learned-conversations').textContent = data.aprendidas.length;
                    document.getElementById('pending-conversations').textContent = data.todas.length - data.aprendidas.length;
                    
                    // Renderizar todas las conversaciones
                    const allDiv = document.getElementById('all-conversations');
                    allDiv.innerHTML = data.todas.map((conv, index) => `
                        <div class="conversation">
                            <div class="conversation-header">
                                <span class="conversation-user">👤 Usuario</span>
                                <span class="conversation-time">${new Date(conv.timestamp).toLocaleString()}</span>
                            </div>
                            <div class="conversation-user">${conv.usuario_mensaje}</div>
                            <div class="conversation-cascade">🤖 Cascade: ${conv.cascade_respuesta.substring(0, 100)}...</div>
                            ${!conv.aprendida ? `<button class="btn" onclick="marcarAprendida(${index})">Marcar como Aprendida</button>` : '<span class="learned-badge">Aprendida</span>'}
                        </div>
                    `).join('');
                    
                    // Renderizar conversaciones aprendidas
                    const learnedDiv = document.getElementById('learned-conversations-list');
                    learnedDiv.innerHTML = data.aprendidas.map(conv => `
                        <div class="conversation">
                            <div class="conversation-header">
                                <span class="conversation-user">👤 Usuario</span>
                                <span class="learned-badge">Aprendida</span>
                            </div>
                            <div class="conversation-user">${conv.usuario_mensaje}</div>
                            <div class="conversation-cascade">🤖 Cascade: ${conv.cascade_respuesta.substring(0, 100)}...</div>
                            <div class="conversation-time">Aprendida: ${new Date(conv.aprendida_timestamp).toLocaleString()}</div>
                        </div>
                    `).join('');
                });
        }
        
        function marcarAprendida(indice) {
            fetch(`/api/marcar_aprendida/${indice}`, { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    if (data.exito) {
                        cargarConversaciones();
                    }
                });
        }
        
        // Cargar conversaciones al inicio y cada 10 segundos
        cargarConversaciones();
        setInterval(cargarConversaciones, 10000);
    </script>
</body>
</html>
