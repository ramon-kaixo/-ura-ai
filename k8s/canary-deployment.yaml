apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: ura-rollout
spec:
  replicas: 5
  strategy:
    canary:
      steps:
      - setWeight: 20
      - pause: {duration: 10m}
      - setWeight: 40
      - pause: {duration: 10m}
      - setWeight: 60
      - pause: {duration: 10m}
      - setWeight: 80
      - pause: {duration: 10m}
      - setWeight: 100
  selector:
    matchLabels:
      app: ura
  template:
    metadata:
      labels:
        app: ura
        version: v2
    spec:
      containers:
      - name: ura
        image: ura:latest
        ports:
        - containerPort: 8000
---
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: success-rate
spec:
  args:
  - name: service-name
    value: ura-service
  - name: success-rate
    value: "95"
  metrics:
  - name: success-rate
    interval: 1m
    successCondition: result[0] >= {{ args.success-rate }}
    provider:
      prometheus:
        address: http://prometheus.monitoring.svc.cluster.local:9090
        query: |
          sum(rate(http_requests_total{service="{{ args.service-name }}",status!~"5.."}[1m])) 
          / 
          sum(rate(http_requests_total{service="{{ args.service-name }}"}[1m]))
