apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-lb-config
  namespace: ura
data:
  nginx.conf: |
    events {
        worker_connections 1024;
    }
    
    http {
        upstream ura_backend {
            least_conn;
            server ura-app:8000 max_fails=3 fail_timeout=30s;
            server ura-app-2:8000 max_fails=3 fail_timeout=30s;
            server ura-app-3:8000 max_fails=3 fail_timeout=30s;
        }
        
        server {
            listen 80;
            
            location / {
                proxy_pass http://ura_backend;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                
                health_check interval=5s fails=3 passes=2;
            }
            
            location /health {
                access_log off;
                return 200 "healthy\n";
                add_header Content-Type text/plain;
            }
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-lb
  namespace: ura
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-lb
  template:
    metadata:
      labels:
        app: nginx-lb
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory": "128Mi"
      volumes:
      - name: config
        configMap:
          name: nginx-lb-config
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-lb
  namespace: ura
spec:
  selector:
    app: nginx-lb
  ports:
  - port: 80
    targetPort: 80
  type: LoadBalancer
