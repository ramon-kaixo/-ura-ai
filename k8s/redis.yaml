apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: ura
spec:
  serviceName: redis
  replicas: 3
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        command:
        - redis-server
        - --appendonly
        - "yes"
        - --maxmemory
        - "2gb"
        - --maxmemory-policy
        - allkeys-lru
        resources:
          limits:
            cpu: "1"
            memory: "2Gi"
          requests:
            cpu: "250m"
            memory": "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: ura
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379
