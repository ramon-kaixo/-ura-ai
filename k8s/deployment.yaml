apiVersion: apps/v1
kind: Deployment
metadata:
  name: ura-app
  labels:
    app: ura
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ura
  template:
    metadata:
      labels:
        app: ura
    spec:
      containers:
      - name: ura
        image: ura:latest
        ports:
        - containerPort: 8000
        env:
        - name: OLLAMA_HOST
          value: "http://ollama-service"
        - name: OLLAMA_PORT
          value: "11434"
        - name: REDIS_HOST
          value: "redis-service"
        - name: POSTGRES_HOST
          value: "postgres-service"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ura-service
spec:
  selector:
    app: ura
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: LoadBalancer
