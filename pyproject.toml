[project]
name = "ura"
version = "2.1.0"
description = "URA - Ultimate Research Agent"
requires-python = ">=3.11"
dependencies = ["click>=8.0", "rich>=13.0"]

[project.scripts]
ura = "cli.gatekeeper:ura"
ura-snc = "monitor.snc:main"
ura-openclaw = "monitor.openclaw:main"
ura-router = "core.model_router:main"
ura-ejecutor = "scripts.pro.ejecutor_api:main"

[tool.setuptools.packages.find]
include = ["core*", "cli*", "TOOLS*", "monitor*"]

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["ALL"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[tool.pytest.ini_options]
minversion = "7.0"
testpaths = ["tests"]
python_files = ["test_*.py"]
filterwarnings = ["ignore::DeprecationWarning"]
timeout = 60
asyncio_mode = "auto"
