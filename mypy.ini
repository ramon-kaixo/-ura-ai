[mypy]
ignore_missing_imports = True
warn_return_any = False
disallow_untyped_defs = False
exclude = api/v2/|sandbox/|archive/|web/|scripts/legacy/|benchmarks/

[mypy-core.*]
ignore_errors = False
disallow_untyped_defs = False

[mypy-agents.*]
ignore_errors = False
disallow_untyped_defs = False

# Archivos con cobertura de tipos 100% — strict mode
[mypy-core.action_signer]
disallow_untyped_defs = True

