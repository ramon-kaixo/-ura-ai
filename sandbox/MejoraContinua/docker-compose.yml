services:
  mejora-continua:
    build: .
    container_name: ura-arena-mejora-continua
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,nodev
    networks:
      - sandbox-net
    volumes:
      - ./:/workspace:ro
      - arena-venv:/workspace/.venv:rw
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OLLAMA_HOST=http://10.164.1.99:11434
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    working_dir: /workspace
    command: sh -c "bash /test_arena.sh && exec tail -f /dev/null"
    restart: unless-stopped

volumes:
  arena-venv:

networks:
  sandbox-net:
    driver: bridge
