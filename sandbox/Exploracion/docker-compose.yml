services:
  squid-proxy:
    build:
      context: .
      dockerfile: Dockerfile.squid
    container_name: ura-squid
    ports:
      - "3128:3128"
    restart: unless-stopped
    networks:
      - exploracion-net

  exploracion:
    build: .
    container_name: ura-exploracion
    network_mode: none
    volumes:
      - ./proyecto_prueba:/sandbox/proyecto_prueba:ro
      - ./scripts:/sandbox/scripts:ro
    environment:
      - http_proxy=http://squid-proxy:3128
      - https_proxy=http://squid-proxy:3128
      - OLLAMA_HOST=http://10.164.1.99:11434
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped
    networks:
      - exploracion-net

networks:
  exploracion-net:
    driver: bridge
