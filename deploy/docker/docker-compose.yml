# URA - Docker Compose para el GX10 (NVIDIA DGX Spark)
# Memoria total: 128 GB (unificada CPU+GPU)
# Ollama (nativo) usa ~80 GB en modelos cargados
# Docker tiene presupuestado ~5 GB - NO superar
#
# Para levantar:
#   docker compose up -d
#
# Servicios nativos fuera de Docker:
#   - Ollama (puerto 11434)
#   - Mosquitto (puerto 1883, en Mac Mini)

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ura-openwebui
    ports:
      - "3080:8080"
    volumes:
      - openwebui-data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://10.164.1.99:11434
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-ura_webui_secret_2026}
    deploy:
      resources:
        limits:
          memory: 2G
    restart: always
    networks:
      - ura-net

  n8n:
    image: n8nio/n8n:latest
    container_name: ura-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://10.164.1.99:5678/
      - N8N_ENCRYPTION_KEY=${N8N_KEY:-ura_n8n_key}
    volumes:
      - n8n-data:/home/node/.n8n
    deploy:
      resources:
        limits:
          memory: 1G
    restart: always
    networks:
      - ura-net

  frigate:
    image: ghcr.io/blakeblackshear/frigate:stable
    container_name: ura-frigate
    ports:
      - "5000:5000"
      - "1935:1935"
    volumes:
      - frigate-config:/config
      - frigate-media:/media/frigate
      - /etc/localtime:/etc/localtime:ro
    environment:
      - FRIGATE_RTSP_PASSWORD=${FRIGATE_RTSP_PASSWORD:-ura_cam_2026}
    deploy:
      resources:
        limits:
          memory: 1G
    restart: always
    networks:
      - ura-net

  redis:
    image: redis:7-alpine
    container_name: ura-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 512M
    restart: always
    networks:
      - ura-net

  prometheus:
    image: prom/prometheus:latest
    container_name: ura-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=200h"
    deploy:
      resources:
        limits:
          memory: 1G
    restart: always
    networks:
      - ura-net

  grafana:
    image: grafana/grafana:latest
    container_name: ura-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-grafana123}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 512M
    restart: always
    networks:
      - ura-net

volumes:
  openwebui-data:
  n8n-data:
  frigate-config:
  frigate-media:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  ura-net:
    driver: bridge
