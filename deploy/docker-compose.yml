services:
  ura-assistant:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - URA_API_KEY=${URA_API_KEY:-}
      - URA_DATA_DIR=/data
      - URA_LLM_TIMEOUT=30
      - URA_HOST=0.0.0.0
      - URA_PORT=8000
    volumes:
      - ura_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  ura_data:
