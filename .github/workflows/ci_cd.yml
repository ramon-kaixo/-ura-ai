name: CI/CD Automático URA

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Ejecutar tests
      run: |
        python -m pytest tests/ -v
    
    - name: Verificar sintaxis
      run: |
        python -m py_compile main_final.py

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Crear backup
      run: |
        tar -czf ura_backup_${{ github.sha }}.tar.gz .
    
    - name: Subir backup
      uses: actions/upload-artifact@v3
      with:
        name: ura-backup
        path: ura_backup_${{ github.sha }}.tar.gz
    
    - name: Desplegar a sandbox
      run: |
        docker compose -f docker-compose-completo.yml restart ura-sandbox

  rollback:
    needs: build
    runs-on: ubuntu-latest
    if: failure()
    
    steps:
    - name: Rollback automático
      run: |
        echo "Rollback automático activado"
        # Restaurar desde backup anterior
