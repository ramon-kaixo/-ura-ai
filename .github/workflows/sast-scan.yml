name: SAST Security Scanning

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC

jobs:
  sast-scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        pip install bandit semgrep
    
    - name: Run Bandit SAST
      run: bandit -r core/ -f json -o bandit-sast-report.json || true
    
    - name: Run Semgrep SAST
      run: semgrep --config=auto --json --output=semgrep-report.json core/ || true
    
    - name: Upload SAST Reports
      uses: actions/upload-artifact@v3
      with:
        name: sast-reports
        path: |
          bandit-sast-report.json
          semgrep-report.json
    
    - name: Check for Critical Issues
      run: |
        # Check Bandit for high severity issues
        if [ -f bandit-sast-report.json ]; then
          CRITICAL=$(python -c "import json; data=json.load(open('bandit-sast-report.json')); print(len([r for r in data.get('results', []) if r.get('issue_severity') == 'HIGH']))")
          if [ "$CRITICAL" -gt 0 ]; then
            echo "Found $CRITICAL high severity security issues"
            exit 1
          fi
        fi
