name: CI

on:
  push:
    branches: [plan-refinado, main]
  pull_request:
    branches: [plan-refinado, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: "pyproject.toml"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff
      - name: Ruff check
        run: ruff check . --output-format=github
      - name: py_compile
        run: |
          find . -name "*.py" -not -path "./.nervioso/*" -not -path "./.venv/*" -not -path "./.sandbox_packages/*" -not -path "./node_modules/*" -exec python3 -m py_compile {} \;

  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: "pyproject.toml"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        run: |
          python -m pytest -q --tb=line \
            --ignore=tests/test_unit.py \
            --ignore=tests/test_openclaw.py \
            --ignore=tests/test_vram_guard.py \
            --ignore=tests/test_sda.py \
            --ignore=tests/test_snc_anomalias.py \
            tests/ motor/tests/ \
            -p no:cov \
            --override-ini="addopts="
      - name: Validate infrastructure
        run: |
          python -c "import yaml; yaml.safe_load(open('deploy/prometheus/alerts.yml'))"
          python -c "import json; json.load(open('deploy/grafana/dashboard.json'))"

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install build
        run: pip install build
      - name: Build wheel + sdist
        run: python -m build
      - name: Check wheel
        run: |
          pip install dist/*.whl
          python -c "import ura; print('OK')" || true
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
