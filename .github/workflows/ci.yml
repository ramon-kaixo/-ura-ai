# CI — URA Platform
# Runs on every push to main and every PR

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff==0.15.18
      - run: ruff check .
      - run: ruff format --check .

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install mypy==2.3.0 httpx pydantic pyyaml orjson
      - run: mypy motor/

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest tests/test_f28_b2_protocol.py tests/test_platform_delivery.py tests/test_platform_resilience.py tests/test_core_secrets.py tests/test_platform_registry.py tests/test_obs_tracing.py tests/test_f14_bugs.py tests/test_events.py tests/test_plugin.py tests/test_memory.py tests/test_agents_comprehensive.py tests/test_compat.py tests/test_memory_historical.py tests/test_intelligence_memory.py tests/test_evaluation.py -q --cov 2>&1 | tail -5
        timeout-minutes: 15

  security:
    name: Security (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install bandit==1.9.4
      - run: bandit -r motor/ core/ knowledge/ -ll -q
