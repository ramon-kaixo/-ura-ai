# CI — URA Platform

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff==0.15.14
      - run: ruff check .
      - run: ruff format --check .

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install mypy==1.18.2 httpx pydantic pyyaml orjson
      - run: mypy motor/observability/ motor/cli/ --no-strict-optional --ignore-missing-imports

  test-motor:
    name: Motor tests (pytest)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: |
          pytest motor/tests/ -q --timeout=60 --no-cov 2>&1 | tail -10
        timeout-minutes: 10

  test-unit:
    name: Unit tests (tests/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: |
          EXCLUDE=""
          while IFS= read -r line; do
            line="${line%%#*}"  # strip inline comments
            case "$line" in
              *[![:space:]]*) EXCLUDE="$EXCLUDE --ignore=tests/$(echo $line | awk '{print $1}')" ;;
            esac
          done < .github/tests-ci-exclude.txt
          pytest tests/ $EXCLUDE -q --timeout=30 --no-cov 2>&1 | tail -5
        timeout-minutes: 15

  security:
    name: Security (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install bandit==1.9.4
      - run: bandit -r motor/ core/ knowledge/ -ll -q

  architecture:
    name: Architecture (ARQ)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 scripts/pro/arq_auditor.py --check
