# CI — URA Platform
# Runs on every push to plan-refinado and every PR

name: CI

on:
  push:
    branches: [plan-refinado]
  pull_request:
    branches: [plan-refinado]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install mypy httpx pydantic pyyaml orjson
      - run: mypy motor/platform/ motor/memory/ motor/agents/models.py

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest tests/test_f28_b2_protocol.py tests/test_platform_delivery.py tests/test_platform_resilience.py tests/test_core_secrets.py tests/test_platform_registry.py tests/test_f14_bugs.py -q --no-cov
        timeout-minutes: 5

  security:
    name: Security (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install bandit
      - run: bandit -r motor/ -ll -q
