name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Ensure environment
        run: |
          pip install -r requirements.txt --upgrade
      - name: Install dependencies
        run: |
          pip install -e .
          pip install pytest ruff mypy bandit pre-commit
      - name: Check dependencies
        run: |
          scripts/check_deps.sh
      - name: Validate __init__.py
        run: |
          python3 scripts/audit_init.py
      - name: Validate system
        run: |
          python3 agents/validador_sistema.py || true
      - name: Lint & format
        run: |
          ruff check .
          ruff format --check
      - name: Type check
        run: mypy core/ agents/ --ignore-missing-imports --exclude "api/v2|sandbox|archive|web|scripts/legacy" || true
      - name: Security scan
        run: bandit -r core/ agents/ -ll || true
      - name: Install tox and pytest-cov
        run: pip install tox pytest-cov
      - name: Run tests with coverage (py312)
        run: |
          tox -e py312 -- --cov=agents/ --cov=core/ --cov-report=xml
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=ramonesnaola
            -Dsonar.projectKey=ura_ia_1972
