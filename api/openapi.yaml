openapi: 3.0.0
info:
  title: URA API
  description: Universal Reasoning Assistant REST API
  version: 2.0.0
  contact:
    name: URA Development Team
    email: dev@ura.ai

servers:
  - url: http://localhost:8000
    description: Development server
  - url: http://localhost:8080
    description: Production server (via API Gateway)

tags:
  - name: Health
    description: Health check endpoints
  - name: Chat
    description: Chat endpoints
  - name: Security
    description: Security validation endpoints
  - name: Metrics
    description: Metrics endpoints
  - name: Config
    description: Configuration endpoints

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check
      description: Check if the API is healthy
      responses:
        '200':
          description: Healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  ollama_connected:
                    type: boolean
                  memory_available_gb:
                    type: number
                  cpu_usage_percent:
                    type: number

  /chat:
    post:
      tags:
        - Chat
      summary: Send chat message
      description: Send a message to URA for processing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - message
              properties:
                message:
                  type: string
                  description: User message
                model:
                  type: string
                  description: Ollama model to use
                  default: qwen2.5:7b-instruct
                context:
                  type: object
                  description: Additional context
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                  model:
                    type: string
                  timestamp:
                    type: string
                    format: date-time
                  processing_time:
                    type: number
        '403':
          description: Command blocked
        '500':
          description: Internal server error

  /security/validate:
    post:
      tags:
        - Security
      summary: Validate command
      description: Validate a command without executing it
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - command
              properties:
                command:
                  type: string
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  command:
                    type: string
                  is_blocked:
                    type: boolean
                  reason:
                    type: string

  /metrics:
    get:
      tags:
        - Metrics
      summary: Get system metrics
      description: Get current system metrics
      responses:
        '200':
          description: Metrics
          content:
            application/json:
              schema:
                type: object
                properties:
                  cpu_usage_percent:
                    type: number
                  memory_usage_percent:
                    type: number
                  memory_available_gb:
                    type: number
                  disk_usage_percent:
                    type: number
                  timestamp:
                    type: string
                    format: date-time

  /config:
    get:
      tags:
        - Config
      summary: Get configuration
      description: Get current configuration
      responses:
        '200':
          description: Configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: string
                  model:
                    type: string
                  security_mode:
                    type: string
                  features:
                    type: array
                    items:
                      type: string
