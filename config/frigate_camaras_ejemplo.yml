# Frigate Configuration - 25 Dahua Cameras (Ejemplo)
# Copiar a /opt/ura/frigate/config.yml y editar IPs, usuarios y passwords RTSP

mqtt:
  host: localhost
  port: 1883

go2rtc:
  streams:
    bar1_entrada: rtsp://usuario:pass@192.168.1.101:554/cam/realmonitor?channel=1&subtype=0
    bar1_barra: rtsp://usuario:pass@192.168.1.102:554/cam/realmonitor?channel=1&subtype=0
    bar1_cocina: rtsp://usuario:pass@192.168.1.103:554/cam/realmonitor?channel=1&subtype=0
    bar2_entrada: rtsp://usuario:pass@192.168.2.101:554/cam/realmonitor?channel=1&subtype=0
    bar2_barra: rtsp://usuario:pass@192.168.2.102:554/cam/realmonitor?channel=1&subtype=0
    bar2_cocina: rtsp://usuario:pass@192.168.2.103:554/cam/realmonitor?channel=1&subtype=0

cameras:
  bar1_entrada:
    enabled: true
    ffmpeg:
      inputs:
        - path: rtsp://usuario:pass@192.168.1.101:554/cam/realmonitor?channel=1&subtype=0
          roles:
            - detect
            - record
      hwaccel_args: preset-vaapi
    detect:
      width: 1280
      height: 720
      fps: 5
    zones:
      entrada_exterior:
        coordinates: 0.1,0.2,0.4,0.2,0.4,0.8,0.1,0.8
      entrada_interior:
        coordinates: 0.5,0.2,0.9,0.2,0.9,0.8,0.5,0.8
    objects:
      track:
        - person
        - car
    record:
      events:
        retain:
          default: 7

  bar1_barra:
    enabled: true
    ffmpeg:
      inputs:
        - path: rtsp://usuario:pass@192.168.1.102:554/cam/realmonitor?channel=1&subtype=0
          roles:
            - detect
            - record
    detect:
      width: 1280
      height: 720
      fps: 5
    zones:
      barra_atencion:
        coordinates: 0.2,0.5,0.8,0.5,0.9,0.9,0.1,0.9
      cocina_acceso:
        coordinates: 0.1,0.1,0.4,0.1,0.4,0.4,0.1,0.4
    objects:
      track:
        - person
    motion:
      mask:
        - 0,0,0.2,0,0.2,0.2,0,0.2

  bar1_cocina:
    enabled: true
    ffmpeg:
      inputs:
        - path: rtsp://usuario:pass@192.168.1.103:554/cam/realmonitor?channel=1&subtype=0
          roles:
            - detect
            - record
    detect:
      width: 1280
      height: 720
      fps: 5
    objects:
      track:
        - person
    record:
      events:
        retain:
          default: 14

  # bar2_entrada, bar2_barra, bar2_cocina: copiar bloques y cambiar IP

detectors:
  cpu:
    type: cpu

objects:
  track:
    - person
    - bottle
    - cup

record:
  enabled: true
  retain:
    days: 7
    mode: all

snapshots:
  enabled: true
  retain:
    default: 14
