# Frigate Configuration - 25 Dahua Cameras (Produccion)
# go2rtc retransmite streams para reducir carga en Frigate
# Cada camara: subtype=0 (main/4K para grabar), subtype=1 (sub/480p para detectar)

go2rtc:
  streams:
    # Bar 1
    barra1_main: rtsp://admin:admin@192.168.1.101:554/cam/realmonitor?channel=1&subtype=0
    barra1_sub:  rtsp://admin:admin@192.168.1.101:554/cam/realmonitor?channel=1&subtype=1
    barra2_main: rtsp://admin:admin@192.168.1.102:554/cam/realmonitor?channel=1&subtype=0
    barra2_sub:  rtsp://admin:admin@192.168.1.102:554/cam/realmonitor?channel=1&subtype=1
    cocina1_main: rtsp://admin:admin@192.168.1.103:554/cam/realmonitor?channel=1&subtype=0
    cocina1_sub:  rtsp://admin:admin@192.168.1.103:554/cam/realmonitor?channel=1&subtype=1
    entrada1_main: rtsp://admin:admin@192.168.1.104:554/cam/realmonitor?channel=1&subtype=0
    entrada1_sub:  rtsp://admin:admin@192.168.1.104:554/cam/realmonitor?channel=1&subtype=1
    terraza1_main: rtsp://admin:admin@192.168.1.105:554/cam/realmonitor?channel=1&subtype=0
    terraza1_sub:  rtsp://admin:admin@192.168.1.105:554/cam/realmonitor?channel=1&subtype=1
    # Bar 2
    barra3_main: rtsp://admin:admin@192.168.2.101:554/cam/realmonitor?channel=1&subtype=0
    barra3_sub:  rtsp://admin:admin@192.168.2.101:554/cam/realmonitor?channel=1&subtype=1
    barra4_main: rtsp://admin:admin@192.168.2.102:554/cam/realmonitor?channel=1&subtype=0
    barra4_sub:  rtsp://admin:admin@192.168.2.102:554/cam/realmonitor?channel=1&subtype=1
    cocina2_main: rtsp://admin:admin@192.168.2.103:554/cam/realmonitor?channel=1&subtype=0
    cocina2_sub:  rtsp://admin:admin@192.168.2.103:554/cam/realmonitor?channel=1&subtype=1
    entrada2_main: rtsp://admin:admin@192.168.2.104:554/cam/realmonitor?channel=1&subtype=0
    entrada2_sub:  rtsp://admin:admin@192.168.2.104:554/cam/realmonitor?channel=1&subtype=1
    terraza2_main: rtsp://admin:admin@192.168.2.105:554/cam/realmonitor?channel=1&subtype=0
    terraza2_sub:  rtsp://admin:admin@192.168.2.105:554/cam/realmonitor?channel=1&subtype=1
    # Bar 3 (camaras 21-25)
    barra5_main: rtsp://admin:admin@192.168.3.101:554/cam/realmonitor?channel=1&subtype=0
    barra5_sub:  rtsp://admin:admin@192.168.3.101:554/cam/realmonitor?channel=1&subtype=1
    cocina3_main: rtsp://admin:admin@192.168.3.102:554/cam/realmonitor?channel=1&subtype=0
    cocina3_sub:  rtsp://admin:admin@192.168.3.102:554/cam/realmonitor?channel=1&subtype=1
    entrada3_main: rtsp://admin:admin@192.168.3.103:554/cam/realmonitor?channel=1&subtype=0
    entrada3_sub:  rtsp://admin:admin@192.168.3.103:554/cam/realmonitor?channel=1&subtype=1
    almacen_main: rtsp://admin:admin@192.168.3.104:554/cam/realmonitor?channel=1&subtype=0
    almacen_sub:  rtsp://admin:admin@192.168.3.104:554/cam/realmonitor?channel=1&subtype=1
    exterior_main: rtsp://admin:admin@192.168.3.105:554/cam/realmonitor?channel=1&subtype=0
    exterior_sub:  rtsp://admin:admin@192.168.3.105:554/cam/realmonitor?channel=1&subtype=1

cameras:
  barra1:
    enabled: true
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/barra1_sub
          roles:
            - detect
        - path: rtsp://127.0.0.1:8554/barra1_main
          roles:
            - record
      hwaccel_args: preset-vaapi
    detect:
      width: 640
      height: 480
      fps: 5
    zones:
      zona_barra:
        coordinates: 0.1,0.2,0.8,0.2,0.9,0.7,0.2,0.9
    objects:
      track:
        - person
    record:
      events:
        retain:
          default: 7

  barra2:
    enabled: true
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/barra2_sub
          roles:
            - detect
        - path: rtsp://127.0.0.1:8554/barra2_main
          roles:
            - record
    detect:
      width: 640
      height: 480
      fps: 5
    objects:
      track:
        - person

  cocina1:
    enabled: true
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/cocina1_sub
          roles:
            - detect
        - path: rtsp://127.0.0.1:8554/cocina1_main
          roles:
            - record
    detect:
      width: 640
      height: 480
      fps: 5
    objects:
      track:
        - person
    record:
      events:
        retain:
          default: 14

  entrada1:
    enabled: true
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/entrada1_sub
          roles:
            - detect
        - path: rtsp://127.0.0.1:8554/entrada1_main
          roles:
            - record
    detect:
      width: 640
      height: 480
      fps: 5
    zones:
      puerta_entrada:
        coordinates: 0.2,0.3,0.8,0.3,0.8,0.9,0.2,0.9
    objects:
      track:
        - person

  # Copiar bloques para camaras restantes (barra3-5, cocina2-3, entrada2-3, terraza1-2, almacen, exterior)
  # Cambiar paths rtsp://127.0.0.1:8554/NOMBRE_sub y NOMBRE_main

mqtt:
  host: localhost
  port: 1883

detectors:
  cpu:
    type: cpu

objects:
  track:
    - person
    - bottle
    - cup

record:
  enabled: true
  retain:
    days: 7
    mode: all

snapshots:
  enabled: true
  retain:
    default: 14
