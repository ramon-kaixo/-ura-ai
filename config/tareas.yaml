# ──────────────────────────────────────────────────────────────────────
# URA — Configuración de tareas programadas para scheduler_orchestrator
# ──────────────────────────────────────────────────────────────────────
# Los comandos deben coincidir EXACTAMENTE con lo que aparece en `crontab -l`
# ──────────────────────────────────────────────────────────────────────

ventanas_exclusion_globales:
  - "02:00-04:00"   # Mantenimiento nocturno (no reprogramar aquí)

tareas:
  - nombre: buzo_inventario
    comando: buzo_inventario.sh
    cron: "0 3 * * *"
    recursos:
      cpu: 0.2
      red: baja
    prioridad: baja
    ventanas_exclusion: []

  - nombre: backup_ura
    comando: /opt/ura/scripts/backup_ura.sh
    cron: "0 5 * * *"
    recursos:
      cpu: 0.8
      disco: alta
    prioridad: critica
    ventanas_exclusion: []

  - nombre: buzo_errores
    comando: /opt/ura/scripts/buzo_errores.sh
    cron: "0 4 * * 1"
    recursos:
      cpu: 0.5
      red: alta
    prioridad: alta
    ventanas_exclusion: []

  - nombre: benchmark
    comando: /opt/ura/scripts/benchmark.py
    cron: "0 6 * * 0"
    recursos:
      cpu: 0.3
      red: baja
    prioridad: media
    ventanas_exclusion: []

  - nombre: docs_index
    comando: /opt/ura/scripts/docs_index.py
    cron: "0 5 * * *"
    recursos:
      cpu: 0.6
      disco: alta
    prioridad: media
    ventanas_exclusion: []

  - nombre: scheduler_orchestrator
    comando: scheduler_orchestrator.py
    cron: "0 * * * *"
    recursos:
      cpu: 0.1
      red: baja
    prioridad: critica
    ventanas_exclusion: []
