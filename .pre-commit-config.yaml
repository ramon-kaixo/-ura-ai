# ============================================================
# .pre-commit-config.yaml — URA v3.1
# Pre-commit proporcional por rama:
# - dev/*: warnings, no aborta
# - main: estricto (ruff + mypy + pytest)
# ============================================================
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: branch-aware-check
        name: Check branch-sensitive rules
        entry: bash -c '
          BRANCH=$(git rev-parse --abbrev-ref HEAD);
          if [[ "$BRANCH" == "main" || "$BRANCH" == "master" ]]; then
            python3 -m pytest motor/tests/ -q --tb=short 2>&1 | tail -5;
            exit ${PIPESTATUS[0]};
          fi
        '
        language: system
        pass_filenames: false
        always_run: true
        pass_filenames: false
        always_run: true
