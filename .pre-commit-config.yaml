repos:
-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.0
    hooks:
    -   id: ruff
        args: [--fix, --exit-non-zero-on-fix, --ignore, E902]
        files: ^core/(mochila|memoria)/
-   repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
    -   id: mypy
        args: [core/mochila/, core/memoria/, --ignore-missing-imports]
        pass_filenames: false
        additional_dependencies: [types-requests, types-PyYAML]
