<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>URA — Search & Status</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:monospace;background:#0d1117;color:#c9d1d9;padding:20px;max-width:900px;margin:auto}
h1{color:#58a6ff;margin-bottom:4px}
.sub{color:#8b949e;font-size:13px;margin-bottom:20px}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;margin-bottom:16px}
.card h2{font-size:13px;color:#8b949e;text-transform:uppercase;margin-bottom:12px}
input{padding:10px;background:#21262d;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;width:80%}
button{padding:10px 20px;background:#238636;color:#fff;border:none;border-radius:6px;cursor:pointer}
.result{padding:10px 0;border-bottom:1px solid #21262d}
.result .t{color:#58a6ff}.result .m{color:#8b949e;font-size:12px}.ok{color:#3fb950}
</style>
</head>
<body>
<h1>URA</h1>
<div class="sub">Buscar en el índice URA-Search</div>
<div class="card">
  <h2>Buscar</h2>
  <input id="q" placeholder="Ej: leyes de terrazas en Navarra" onkeydown="if(event.key==='Enter') s()">
  <button onclick="s()" style="margin-left:8px">Buscar</button>
  <div id="r"></div>
</div>
<div class="card">
  <h2>Sistema</h2>
  <div id="sys">Cargando...</div>
</div>
<script>
async function s(){
  const q=document.getElementById('q').value; if(!q)return;
  document.getElementById('r').innerHTML='Buscando...';
  const d=await(await fetch('/api/search?q='+encodeURIComponent(q))).json();
  let h=(d.total||0)+' resultados';
  (d.results||[]).slice(0,15).forEach(i=>{
    h+='<div class=\"result\"><div class=\"t\">'+(i.titulo||i.metric_name||i.source||'—')+'</div>'
    +(i.fuente?'<div class=\"m\">'+i.fuente+'</div>':'')+'</div>';
  });
  document.getElementById('r').innerHTML=h;
}
async function refresh(){
  try{
    const d=await(await fetch('/supervisor')).json();
    const t=d.tasks||[]; const ok=t.filter(x=>!x.done&&!x.last_error).length;
    document.getElementById('sys').innerHTML='<span class=\"ok\">●</span> '+ok+'/'+t.length+' tasks — '+
    (d.router?.latency_ms||'?')+'ms — Mode: '+(d.mode||'?');
  }catch(e){document.getElementById('sys').innerHTML='Error';}
}
refresh(); setInterval(refresh,10000);
</script>
</body>
</html>
