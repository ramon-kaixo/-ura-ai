<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URA Auto-Repair Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a2e; color: #eee; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; margin-bottom: 30px; color: #4ecca3; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #16213e; padding: 20px; border-radius: 10px; text-align: center; }
        .stat-value { font-size: 2em; font-weight: bold; color: #4ecca3; }
        .stat-label { color: #888; margin-top: 5px; }
        .charts-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 30px; }
        .chart-container { background: #16213e; padding: 20px; border-radius: 10px; }
        .history-container { background: #16213e; padding: 20px; border-radius: 10px; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #333; }
        th { color: #4ecca3; }
        .success { color: #4ecca3; }
        .failure { color: #e94560; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        button { padding: 10px 20px; background: #4ecca3; color: #1a1a2e; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #45b393; }
        .simulation-active { background: #e94560; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>URA Auto-Repair Dashboard</h1>
        
        <div class="controls">
            <button onclick="refreshStats()">🔄 Actualizar</button>
            <button onclick="toggleSimulation()" id="simBtn">🎭 Simulación</button>
            <button onclick="runPreventive()">🔍 Preventivo</button>
            <button onclick="trainML()">🤖 Entrenar ML</button>
            <button onclick="generatePDF()">📄 PDF</button>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalRepairs">0</div>
                <div class="stat-label">Total Reparaciones</div>
            </div>
            <div class="stat-card">
                <div class="stat-value success" id="successRepairs">0</div>
                <div class="stat-label">Exitosas</div>
            </div>
            <div class="stat-card">
                <div class="stat-value failure" id="failedRepairs">0</div>
                <div class="stat-label">Fallidas</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="successRate">0%</div>
                <div class="stat-label">Tasa de Éxito</div>
            </div>
        </div>
        
        <div class="charts-grid">
            <div class="chart-container">
                <canvas id="successChart"></canvas>
            </div>
            <div class="chart-container">
                <canvas id="recurrentChart"></canvas>
            </div>
        </div>
        
        <div class="history-container">
            <h2>Historial de Reparaciones</h2>
            <table>
                <thead>
                    <tr>
                        <th>Timestamp</th>
                        <th>Tipo</th>
                        <th>Estado</th>
                        <th>Mensaje</th>
                    </tr>
                </thead>
                <tbody id="historyTable">
                </tbody>
            </table>
        </div>
    </div>
    
    <script>
        let successChart, recurrentChart;
        
        async function refreshStats() {
            const response = await fetch('/api/stats');
            const data = await response.json();
            
            document.getElementById('totalRepairs').textContent = data.total_repairs;
            document.getElementById('successRepairs').textContent = data.successful_repairs;
            document.getElementById('failedRepairs').textContent = data.failed_repairs;
            document.getElementById('successRate').textContent = data.success_rate + '%';
            
            if (data.simulation_mode) {
                document.getElementById('simBtn').classList.add('simulation-active');
            } else {
                document.getElementById('simBtn').classList.remove('simulation-active');
            }
            
            updateCharts(data);
            loadHistory();
        }
        
        function updateCharts(data) {
            // Success Chart
            const successCtx = document.getElementById('successChart').getContext('2d');
            if (successChart) successChart.destroy();
            successChart = new Chart(successCtx, {
                type: 'doughnut',
                data: {
                    labels: ['Exitosas', 'Fallidas'],
                    datasets: [{
                        data: [data.successful_repairs, data.failed_repairs],
                        backgroundColor: ['#4ecca3', '#e94560']
                    }]
                }
            });
            
            // Recurrent Chart
            const recurrentCtx = document.getElementById('recurrentChart').getContext('2d');
            if (recurrentChart) recurrentChart.destroy();
            recurrentChart = new Chart(recurrentCtx, {
                type: 'bar',
                data: {
                    labels: Object.keys(data.recurrent_errors),
                    datasets: [{
                        label: 'Errores Recurrentes',
                        data: Object.values(data.recurrent_errors),
                        backgroundColor: '#4ecca3'
                    }]
                }
            });
        }
        
        async function loadHistory() {
            const response = await fetch('/api/history');
            const data = await response.json();
            
            const tbody = document.getElementById('historyTable');
            tbody.innerHTML = '';
            
            data.history.slice(0, 20).forEach(entry => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${entry.timestamp}</td>
                    <td>${entry.error_type}</td>
                    <td class="${entry.success ? 'success' : 'failure'}">${entry.success ? '✅' : '❌'}</td>
                    <td>${entry.repair_message}</td>
                `;
                tbody.appendChild(tr);
            });
        }
        
        async function toggleSimulation() {
            await fetch('/api/toggle-simulation', { method: 'POST' });
            refreshStats();
        }
        
        async function runPreventive() {
            await fetch('/api/preventive', { method: 'POST' });
            alert('Verificaciones preventivas completadas');
            refreshStats();
        }
        
        async function trainML() {
            const response = await fetch('/api/train-ml', { method: 'POST' });
            const data = await response.json();
            alert(data.message);
            refreshStats();
        }
        
        async function generatePDF() {
            const response = await fetch('/api/generate-pdf', { method: 'POST' });
            const data = await response.json();
            if (data.success) {
                alert('PDF generado: ' + data.path);
            } else {
                alert('Error generando PDF');
            }
        }
        
        refreshStats();
        setInterval(refreshStats, 30000);
    </script>
</body>
</html>
