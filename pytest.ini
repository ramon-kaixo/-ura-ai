[pytest]
# Excluir directorios que causan errores de colección o requieren hardware específico
norecursedirs =
    quarantine
    archive
    benchmarks
    scripts/GX10
    scripts/manual_tests
    .venv
    venv
    __pycache__
    .git

# Configuración de advertencias
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Opciones de pytest
addopts =
    --quiet
    --strict-markers
    --tb=short
